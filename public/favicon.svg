<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#6C5CE7"/>
  
  <!-- Flashcard shape (white card) -->
  <rect x="6" y="8" width="20" height="16" rx="3" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5"/>
  
  <!-- Card lines (text lines on flashcard) -->
  <line x1="10" y1="13" x2="22" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="17" x2="18" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Small star/sparkle for AI -->
  <circle cx="22" cy="10" r="3" fill="#a855f7"/>
  <text x="20.5" y="12" font-family="Arial" font-size="4" fill="white" font-weight="bold">✦</text>
</svg>
